<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Streaming viewer</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
      html, body {
        padding:0;
        margin:0;
        height: 100%;
      }
      iframe {
        position: absolute;
        bottom: 0px;
        left: 0px;
        height: 100%;
        width: 500px;
        background: white;
        padding: 0px;
        margin: 0px;
        border: 0px;
      }

      webots-view {
        position: absolute!important;
        left: 500px;
        width: calc(100% - 500px);
        border: 0px;
        margin: 0px;
        min-width: 320px;
        overflow-x:hidden;
      }

      .menu-button .arrow-right{
        border: solid white;
        border-width: 0 2px 2px 0;
        display: inline-block;
        padding: 4px;
        transform: rotate(-45deg);
        -webkit-transform: rotate(-45deg);
        position: absolute;
        top: calc(50% - 5px);
        left: calc(50% - 10px);
        pointer-events: none;
      }

      .menu-button .arrow-left{
        border: solid white;
        border-width: 0 2px 2px 0;
        display: inline-block;
        padding: 4px;
        transform: rotate(135deg);
        -webkit-transform: rotate(135deg);
        position: absolute;
        top: calc(50% - 5px);
        left: calc(50% - 5px);
        pointer-events: none;
      }

      .menu-button {
        position: absolute;
        top:calc(50% - 15px);
        left: 500px;
        width: 26px;
        height: 52px;
        border-top-right-radius: 24px;
        border-bottom-right-radius: 24px;
        background-color: #333;
        border-color: transparent;
        z-index: 2;
        display: none;
      }
    </style>
  </head>

  <body>
    <script type="module">
      import WebotsView from "https://cyberbotics.com/wwi/R2025a/WebotsView.js";
      let webotsView = new WebotsView();
      document.body.appendChild(webotsView);
      webotsView.connect('https://simulation.webots.cloud/1999/session?url=https://github.com/cyberbotics/artificialbrains2025a/blob/main/worlds/custom_robot_window.wbt', undefined, undefined, undefined, 900);
    </script>
  </body>

</html>
